services:
  - type: web
    name: testsense
    runtime: python
    region: oregon
    plan: free

    buildCommand: pip install -r requirements.txt

    startCommand: bash -c 'playwright install chromium --with-deps && uvicorn main:app --host 0.0.0.0 --port $PORT'

    envVars:
      - key: GROQ_API_KEY
        sync: false          # you will paste this value in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: API_BASE
        sync: false   # paste your Render service URL here, e.g. https://testsense.onrender.com
