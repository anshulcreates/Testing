services:
  - type: web
    name: testsense
    runtime: python
    region: oregon
    plan: free

    buildCommand: bash build.sh

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright-browsers
      - key: API_BASE
        sync: false
